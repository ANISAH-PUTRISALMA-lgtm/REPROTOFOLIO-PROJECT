<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Card - Abeyla</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="window-container">
        <!-- Bagian Atas / Header Window -->
        <div class="window-header">
            <div class="search-bar">
                <span>SEARCH...</span>
                <div class="search-icon">🔍</div>
            </div>
            <div class="window-controls">
                <span class="control-btn">_</span>
                <span class="control-btn">❑</span>
                <span class="control-btn x-btn">X</span>
            </div>
        </div>

        <div class="window-content">
            <!-- Area Gambar dan Navigasi Samping -->
            <div class="main-display">
                <div class="side-nav">
                    <div class="nav-box">▲</div>
                    <div class="nav-box">▼</div>
                </div>
                
                <div class="image-frame">
                    <img src="https://via.placeholder.com/300x400" alt="Character Art">
                    <div class="name-overlay">Abeyla</div>
                </div>
            </div>

            <!-- Bagian Bawah / Info -->
            <div class="footer-section">
                <div class="resize-icon">↙↗</div>
                <div class="capsule-container">
                    <div class="capsule"></div>
                    <div class="capsule heart">♥</div>
                    <div class="capsule"></div>
                </div>
                <div class="text-info">
                    <p>3 Kata Untuk</p>
                    <h3>Abeyla</h3>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
