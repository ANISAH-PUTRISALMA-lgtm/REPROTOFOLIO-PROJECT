<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Card</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="window-container">
        <!-- Top Navigation Bar -->
        <div class="window-header">
            <div class="search-bar">
                <span>SEARCH...</span>
                <div class="search-icon">🔍</div>
            </div>
            <div class="window-controls">
                <span class="control-btn">_</span>
                <span class="control-btn">❑</span>
                <span class="control-btn x-btn">X</span>
            </div>
        </div>

        <div class="window-content">
            <div class="main-display">
                <!-- Tombol Navigasi -->
                <div class="side-nav">
                    <button class="nav-box" onclick="prevImage()">▲</button>
                    <button class="nav-box" onclick="nextImage()">▼</button>
                </div>
                
                <!-- Display Gambar & Nama -->
                <div class="image-frame">
                    <img id="profile-img" src="gambar1.jpg" alt="Art">
                    <div class="name-overlay" id="profile-name">Abeyla</div>
                </div>
            </div>

            <!-- Bagian Info Bawah -->
            <div class="footer-section">
                <div class="resize-icon">↙↗</div>
                <div class="capsule-container">
                    <div class="capsule"></div>
                    <div class="capsule heart">♥</div>
                    <div class="capsule"></div>
                </div>
                <div class="text-info">
                    <p>3 Kata Untuk</p>
                    <h3 id="footer-name">Abeyla</h3>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Masukkan link gambar kamu di sini
        const profiles = [
            { img: "gambar1.jpg", name: "Abeyla" },
            { img: "gambar2.jpg", name: "Cantika" },
            { img: "gambar3.jpg", name: "Dewi" }
        ];

        let currentIndex = 0;

        function updateProfile() {
            const imgElement = document.getElementById('profile-img');
            const nameElement = document.getElementById('profile-name');
            const footerName = document.getElementById('footer-name');

            imgElement.style.opacity = '0.3';
            
            setTimeout(() => {
                imgElement.src = profiles[currentIndex].img;
                nameElement.innerText = profiles[currentIndex].name;
                footerName.innerText = profiles[currentIndex].name;
                imgElement.style.opacity = '1';
            }, 150);
        }

        function nextImage() {
            currentIndex = (currentIndex + 1) % profiles.length;
            updateProfile();
        }

        function prevImage() {
            currentIndex = (currentIndex - 1 + profiles.length) % profiles.length;
            updateProfile();
        }
    </script>
</body>
</html>
